name: Indexer API — Lint, Build & Smoke

on:
  push:
    paths:
      - 'services/indexer-api/**'
      - '.github/workflows/indexer-api.yml'
  pull_request:
    paths:
      - 'services/indexer-api/**'
      - '.github/workflows/indexer-api.yml'

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Cache keyed on both lock files so changes to either bust the cache
          cache-dependency-path: |
            package-lock.json
            services/indexer-api/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install indexer-api dependencies
        working-directory: services/indexer-api
        run: npm ci

      - name: TypeScript type-check
        working-directory: services/indexer-api
        run: npm run lint

      - name: TypeScript compile
        working-directory: services/indexer-api
        run: npm run build

  smoke:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: lint-build

    steps:
      - name: Check Secret Availability
        id: prereq
        env:
          HAS_SECRET: ${{ secrets.MONAD_RPC_URL != '' }}
          IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          if [ "$HAS_SECRET" != "true" ]; then
            if [ "$IS_FORK" == "true" ]; then
              echo "::warning title=Smoke Test Skipped::MONAD_RPC_URL secret is missing on a fork PR. Skipping smoke test gracefully."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error title=Missing Required Secret::MONAD_RPC_URL is unset. Mainline workflows must fail to prevent false confidence."
              exit 1
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.prereq.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.prereq.outputs.skip != 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            services/indexer-api/package-lock.json

      - name: Install root dependencies
        if: steps.prereq.outputs.skip != 'true'
        run: npm ci

      - name: Install indexer-api dependencies
        if: steps.prereq.outputs.skip != 'true'
        working-directory: services/indexer-api
        run: npm ci

      - name: Start indexer API in background
        if: steps.prereq.outputs.skip != 'true'
        env:
          MONAD_RPC_URL: ${{ secrets.MONAD_RPC_URL }}
          MONAD_CHAIN_ID: ${{ vars.MONAD_CHAIN_ID || '10143' }}
          INDEXER_API_PORT: '8787'
          # Use a long poll interval so CI doesn't wait for a full sync cycle
          INDEXER_POLL_INTERVAL_MS: '60000'
        run: |
          npm run indexer:api &
          echo "INDEXER_PID=$!" >> "$GITHUB_ENV"
          # Wait up to 40 s for the HTTP server to accept connections
          for i in $(seq 1 20); do
            curl -sf http://localhost:8787/health && break || sleep 2
          done

      - name: Run smoke tests
        if: steps.prereq.outputs.skip != 'true'
        env:
          INDEXER_API_BASE_URL: http://localhost:8787
          SMOKE_ADDRESS: ${{ vars.SMOKE_ADDRESS || '0x0000000000000000000000000000000000000001' }}
        working-directory: services/indexer-api
        run: npm run smoke

      - name: Stop indexer
        if: always() && steps.prereq.outputs.skip != 'true'
        run: kill "$INDEXER_PID" || true
