name: Frontend — Lint & Build

on:
  push:
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend.yml'

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run lint

      - name: Vite production build
        env:
          # Provide stub values so the build succeeds without real secrets
          VITE_DATA_MODE: mock
          VITE_API_BASE_URL: http://localhost:8787
        run: npm run build
